name: Docs Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: npm ci

      - name: Install fitness Python dependencies
        run: python3 -m pip install -r docs/fitness/requirements.txt

      - name: Run checks
        run: npm run check
